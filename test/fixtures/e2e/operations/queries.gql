query GetUser($id: ID!) {
  user(id: $id) {
    id
    name
    email
    role
    avatar
    createdAt
    updatedAt
  }
}

query ListUsers($limit: Int, $offset: Int, $role: UserRole) {
  users(limit: $limit, offset: $offset, role: $role) {
    id
    name
    email
    role
    createdAt
  }
}

query GetPost($id: ID!) {
  post(id: $id) {
    id
    title
    body
    status
    authorId
    publishedAt
    createdAt
    tagIds
  }
}

query ListPosts($filter: PostsFilterInput, $limit: Int, $offset: Int) {
  posts(filter: $filter, limit: $limit, offset: $offset) {
    nodes {
      id
      title
      status
      authorId
      createdAt
    }
    totalCount
    hasMore
  }
}

query GetTags {
  tags {
    id
    name
    slug
  }
}

query GetTagBySlug($slug: String!) {
  tagBySlug(slug: $slug) {
    id
    name
    slug
  }
}
